  <!DOCTYPE html>                                                                                                                                                                                                                   
  <html lang="ko">                                                                                                                                                                                                                  
  <head>                                                                                                                                                                                                                            
    <meta charset="UTF-8">                                                                                                                                                                                                          
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오늘은.</title>

    <!-- 웹 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <!-- OG meta — 메신저 프리뷰 -->
    <meta property="og:title" content="오늘은. — 노트 공유">
    <meta property="og:description" content="누군가 당신에게 노트를 보냈어요. 앱에서 받아보세요.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">

    <style>
      :root {
        --bg: #F5EFE4;
        --ink: #3D2817;
        --ink-soft: #8B6F4E;
        --accent: #7A2A1F;
        --serif: 'Nanum Myeongjo', 'Apple SD Gothic Neo', serif;
        --sans: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--ink);
        text-align: center;
        padding: 60px 20px;
        line-height: 1.5;
        margin: 0;
      }

      /* "오늘은." — 명조 */
      h1.brand {
        font-family: var(--serif);
        font-size: 26px;
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--accent);
      }

      /* "오늘은." 아래 hairline divider */
      .brand-divider {
        width: 72px;
        height: 1px;
        background: var(--ink);
        opacity: 0.18;
        margin: 16px auto 0;
        border: 0;
      }

      .preview {
        margin: 36px auto 28px;
        max-width: 520px;
        min-height: 96px;
      }

      /* 노트 제목 — 명조 */
      .note-title {
        font-family: var(--serif);
        font-size: 30px;
        font-weight: 700;
        word-break: keep-all;
        color: var(--ink);
        opacity: 0;
        transition: opacity 240ms ease;
        letter-spacing: -0.5px;
      }
      .note-title.show { opacity: 1; }

      /* 메타 / 안내 — 산세리프 */
      .note-meta {
        margin-top: 8px;
        color: var(--ink-soft);
        font-size: 14px;
        opacity: 0;
        transition: opacity 240ms ease;
      }
      .note-meta.show { opacity: 1; }

      .help {
        color: var(--ink-soft);
        font-size: 15px;
        margin-bottom: 24px;
      }

      /* 버튼 — 산세리프 */
      a.cta, button.cta {
        display: inline-block;
        background: var(--accent);
        color: var(--bg);
        padding: 12px 28px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        border: none;
        cursor: pointer;
        font-family: var(--sans);
        margin: 4px;
      }
      a.cta:hover, button.cta:hover { opacity: 0.92; }

      .actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      /* 디버그 패널 — ?debug=1 일 때만 */
      #debug {
        display: none;
        margin: 32px auto;
        max-width: 560px;
        text-align: left;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        color: #333;
        max-height: 400px;
        overflow: auto;
      }
      #debug.show { display: block; }
      #debug .ok { color: #2a7a2a; }
      #debug .err { color: #a83030; font-weight: 600; }
      #debug .step { color: var(--accent); font-weight: 600; }
    </style>
  </head>
  <body>
    <h1 class="brand">오늘은.</h1>
    <hr class="brand-divider">

    <div class="preview">
      <div id="note-title" class="note-title">&nbsp;</div>
      <div id="note-meta" class="note-meta">&nbsp;</div>
    </div>

    <p class="help">이 노트를 받으려면 앱이 필요해요.</p>
    <div class="actions">
      <button id="open-app" class="cta" style="display:none">앱에서 열기</button>
      <a class="cta" href="https://play.google.com/store/apps/details?id=com.ssavice.today">
        Play Store 에서 받기
      </a>
    </div>
    <div id="debug"></div>

    <script>
    (function () {
      const PKG = 'com.ssavice.today';
      const HOST = 'ksc-today.github.io';
      const PATH_PREFIX = '/todayredirect/share/';
      const FALLBACK_URL = 'https://play.google.com/store/apps/details?id=' + PKG;

      // ---- Debug logger — 페이지에 표시 + console.log ----
      const params = new URLSearchParams(window.location.search);
      const debugMode = params.get('debug') === '1';
      const debugEl = document.getElementById('debug');
      if (debugMode) debugEl.classList.add('show');
      function log(level, msg) {
        const tag = level === 'err' ? '[ERR]' : level === 'ok' ? '[OK ]' : '[ . ]';
        console.log(tag, msg);
        if (debugMode) {
          const line = document.createElement('div');
          line.className = level;
          line.textContent = tag + ' ' + msg;
          debugEl.appendChild(line);
        }
      }
      function logStep(s) { log('step', s); }
      function logOk(s)   { log('ok', s); }
      function logErr(s)  { log('err', s); }

      logStep('share page loaded — pathname=' + window.location.pathname + ' search=' + window.location.search);

      // ---- Payload 추출: query string 우선, path segment 폴백 ----
      let payload = params.get('d');
      if (payload) {
        logOk('payload from query: length=' + payload.length);
      } else {
        // 구 형식 호환: /todayredirect/share/<payload>
        const m = window.location.pathname.match(/^\/todayredirect\/share\/([^\/?#]+)\/?$/);
        if (m) {
          payload = m[1];
          logOk('payload from path (legacy): length=' + payload.length);
        } else {
          logErr('no payload found in URL');
          return;
        }
      }

      const isAndroid = /Android/i.test(navigator.userAgent || '');
      logStep('platform: ' + (isAndroid ? 'Android' : 'non-Android (' + (navigator.userAgent || '?') + ')'));

      // ---- 올바른 intent URI: host/path 가 실제 https URL 과 동일해야 매칭. ----
      const intentUrl =
        'intent://' + HOST + PATH_PREFIX + '?d=' + encodeURIComponent(payload) +
        '#Intent;scheme=https;package=' + PKG +
        ';S.browser_fallback_url=' + encodeURIComponent(FALLBACK_URL) + ';end';

      // ---- 1) 모든 플랫폼: 페이로드 디코딩 → 요약 표시 ----
      decodeAndShow(payload).catch(function (e) { logErr('decodeAndShow failed: ' + (e && e.message || e)); });

      // ---- 2) Android: 1.5s 후 자동 intent 발사 (검증된 App Link 면 페이지 로드 자체가
      //        안 일어나니 도달 안 함; 도달했단 건 Chrome 주소창 / 인앱 webview 등 인터셉트
      //        못한 경로). 사용자에게 잠깐 요약 보여준 뒤 앱 진입. ----
      if (isAndroid) {
        const btn = document.getElementById('open-app');
        btn.style.display = 'inline-block';
        btn.addEventListener('click', function () {
          logStep('manual button → ' + intentUrl);
          window.location.replace(intentUrl);
        });
        if (!debugMode) {
          // debug 모드일 땐 자동 redirect 끔 (페이지 떠나면 로그 못 봄)
          setTimeout(function () {
            logStep('auto redirect → ' + intentUrl);
            window.location.replace(intentUrl);
          }, 1500);
        } else {
          logStep('debug mode: auto-redirect 비활성. 수동 버튼 사용.');
        }
      }
    })();

    async function decodeAndShow(payload) {
      log('step', 'decodeAndShow: start');

      const compressed = urlSafeB64ToBytes(payload);
      log('ok', 'base64 → ' + compressed.length + ' bytes');

      const cborBytes = await gunzip(compressed);
      log('ok', 'gunzip → ' + cborBytes.length + ' bytes');

      const dto = parseCbor(cborBytes);
      log('ok', 'cbor parsed → keys=' + (dto && typeof dto === 'object' ? Object.keys(dto).join(',') : '(not object)'));

      if (!dto || typeof dto !== 'object') {
        log('err', 'dto is not an object');
        return;
      }
      const title = typeof dto.title === 'string' ? dto.title.trim() : '';
      const itemCount = Array.isArray(dto.items) ? dto.items.length : 0;
      log('ok', 'title="' + title + '" items=' + itemCount + ' v=' + dto.v + ' type=' + dto.type);
      if (!title) {
        log('err', 'title is blank');
        return;
      }

      const t = document.getElementById('note-title');
      const m = document.getElementById('note-meta');
      t.textContent = title;
      t.classList.add('show');
      m.textContent = '할 일 ' + itemCount + '개';
      m.classList.add('show');
      document.title = title + ' · 오늘은.';

      function log(level, msg) {
        const tag = level === 'err' ? '[ERR]' : level === 'ok' ? '[OK ]' : '[ . ]';
        console.log(tag, msg);
        const debugEl = document.getElementById('debug');
        if (debugEl && debugEl.classList.contains('show')) {
          const line = document.createElement('div');
          line.className = level;
          line.textContent = tag + ' ' + msg;
          debugEl.appendChild(line);
        }
      }
    }

    function urlSafeB64ToBytes(s) {
      s = s.replace(/-/g, '+').replace(/_/g, '/');
      while (s.length % 4) s += '=';
      const raw = atob(s);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    // 모던 브라우저 native gunzip — Response/DecompressionStream 파이프라인이 가장 안정.
    async function gunzip(bytes) {
      const stream = new Response(bytes).body.pipeThrough(new DecompressionStream('gzip'));
      const buf = await new Response(stream).arrayBuffer();
      return new Uint8Array(buf);
    }

    // kotlinx-serialization-cbor 의 default 출력 (definite-length, string-key map) 만 처리.
    function parseCbor(bytes) {                                                                                                                                                                                                     
      let i = 0;                                         
      const BREAK = 0xFF;

      function readArg(b) {
        const a = b & 0x1F;
        if (a < 24) return a;
        if (a === 24) return bytes[i++];
        if (a === 25) { const v = (bytes[i] << 8) | bytes[i+1]; i += 2; return v; }
        if (a === 26) {
          const v = ((bytes[i] << 24) | (bytes[i+1] << 16) | (bytes[i+2] << 8) | bytes[i+3]) >>> 0;
          i += 4; return v;
        }
        if (a === 27) { i += 8; return 0; }  // 8-byte uint — 우리 페이로드엔 안 나옴
        throw new Error('cbor unsupported arg ' + a);
      }

      function read() {
        const b = bytes[i++];
        const major = b >> 5;
        const lowFive = b & 0x1F;

        // ── indefinite-length: 컬렉션이 0xFF break 까지 ──────────────────
        if (lowFive === 31) {
          if (major === 4) { // array
            const arr = [];
            while (bytes[i] !== BREAK) arr.push(read());
            i++; // consume break
            return arr;
          }
          if (major === 5) { // map
            const m = {};
            while (bytes[i] !== BREAK) {
              const k = read();
              m[k] = read();
            }
            i++;
            return m;
          }
          if (major === 2 || major === 3) { // bstr / tstr — chunked
            const parts = [];
            while (bytes[i] !== BREAK) parts.push(read());
            i++;
            if (major === 2) {
              let total = 0;
              for (const p of parts) total += p.length;
              const out = new Uint8Array(total);
              let off = 0;
              for (const p of parts) { out.set(p, off); off += p.length; }
              return out;
            }
            return parts.join('');
          }
          throw new Error('cbor indefinite-length not allowed for major ' + major);
        }

        // ── definite-length ─────────────────────────────────────────────
        const arg = readArg(b);
        if (major === 0) return arg;
        if (major === 1) return -1 - arg;
        if (major === 2) { const buf = bytes.slice(i, i + arg); i += arg; return buf; }
        if (major === 3) {
          const buf = bytes.slice(i, i + arg); i += arg;
          return new TextDecoder('utf-8').decode(buf);
        }
        if (major === 4) {
          const arr = []; for (let j = 0; j < arg; j++) arr.push(read()); return arr;
        }
        if (major === 5) {
          const m = {};
          for (let j = 0; j < arg; j++) { const k = read(); m[k] = read(); }
          return m;
        }
        if (major === 6) return read();  // tag — unwrap
        if (major === 7) {
          if (arg === 22 || arg === 23) return null;
          if (arg === 21) return true;
          if (arg === 20) return false;
          throw new Error('cbor major7 arg ' + arg);
        }
        throw new Error('cbor major ' + major);
      }

      return read();
    }
    </script>
  </body>
  </html>
